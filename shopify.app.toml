# Shopify app config. Run `shopify app dev --reset` to fill client_id and URLs.
# See: https://shopify.dev/docs/api/shopify-cli#shopify-app-toml

client_id = ""
name = "Laravel Shopify App"
application_url = "https://your-app-url.com"
embedded = true

[access_scopes]
scopes = "write_products"

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request" ]
  uri = "/webhooks/gdpr/customers/data_request"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/redact" ]
  uri = "/webhooks/gdpr/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = [ "shop/redact" ]
  uri = "/webhooks/gdpr/shop/redact"
